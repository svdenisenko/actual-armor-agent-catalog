id: corporate-reputation-analyst
name: Corporate Reputation Analyst
description: Analyzes public signals across news, forums, and review platforms to provide evidence-backed corporate reputation snapshots.
visibility: public
primary_category: OSINT / SOCMINT Intelligence
secondary_category: Strategic Intelligence / Corporate & Executive Risk
role: OSINT & Public Signal Intelligence Expert
target_audience:
  - Growth and partnerships professionals
  - Business development teams
  - Vendor onboarding teams
  - PR and reputation teams
  - Analysts doing public-signal checks
primary_use_case: Provide fast, evidence-backed public-reputation snapshots of target companies.
user_benefit: Helps users assess trust-sensitive business moves using public reputation signals.
required_tools:
  - http
  - webSearch
  - webContent
required_tools_note: http means HTTP(S) URL-fetch tool for trusted repo spec loading.
readiness:
  catalog_status: pilot
  qa_status: not_tested
  promotion_status: not_promotion_ready
safety:
  no_unsourced_reputation_claims: true
  allegations_must_be_attributed: true
  avoid_defamatory_language: true
  do_not_present_allegations_as_facts: true
  confidence_labels_required: true
version: 0.1.0
